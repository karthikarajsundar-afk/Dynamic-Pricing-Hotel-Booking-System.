<!DOCTYPE html>
<html>
<head>
  <title>Hotel Booking</title>
</head>
<body>

<h1>🏨 Hotel Booking System</h1>
<div id="hotels"></div>

<script>
async function loadHotels() {
  const res = await fetch("http://localhost:5000/hotels");
  const hotels = await res.json();

  const container = document.getElementById("hotels");
  container.innerHTML = "";

  hotels.forEach(hotel => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${hotel.name}</h3>
      <p>${hotel.location}</p>
      <p>Rooms: ${hotel.roomsAvailable}</p>

      <button onclick="getPrice('${hotel._id}')">Check Price</button>
      <button onclick="bookHotel('${hotel._id}')">Book</button>

      <p id="price-${hotel._id}"></p>
      <hr/>
    `;

    container.appendChild(div);
  });
}

async function getPrice(id) {
  const res = await fetch(`http://localhost:5000/price/${id}`);
  const data = await res.json();

  document.getElementById(`price-${id}`).innerText =
    "Price: ₹" + data.price;
}

async function bookHotel(id) {
  const res = await fetch("http://localhost:5000/book", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ hotelId: id })
  });

  const data = await res.json();
  alert(data.message + " ₹" + data.price);

  loadHotels();
}

loadHotels();
</script>

</body>
</html>
